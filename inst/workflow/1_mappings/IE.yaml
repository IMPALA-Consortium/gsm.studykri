meta:
  Type: Mapped
  ID: IE
  Description: Inclusion/Exclusion Criteria Data Mapping
  Priority: 1
spec:
  Raw_IE:
    studyid:
      type: character
    subjid:
      type: character
    tiver:
      type: character
    ieorres:
      type: character
    iecat:
      type: character
steps:
  - output: ie_violation
    name: gsm.core::RunQuery
    params:
      df: Raw_IE
      strQuery: "SELECT * ,
        CASE
          WHEN iecat = 'EXCL' AND ieorres = '1' then 'Y'
          WHEN iecat = 'INCL' AND ieorres = '0' then 'Y'
        END as ie_violation
       FROM df"
  - output: Mapped_IE
    name: gsm.core::RunQuery
    params:
      df: ie_violation
      strQuery: "SELECT * FROM df WHERE subjid IS NOT NULL AND ie_violation = 'Y'"
