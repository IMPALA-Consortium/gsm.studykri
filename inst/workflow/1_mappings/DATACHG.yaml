meta:
  Type: Mapped
  ID: DATACHG
  Description: Data Changes Data Mapping
  Priority: 2
spec:
  Raw_DATACHG:
    studyid:
      type: character
    subject_nsv:
      type: character
      source_col: subjectname
    n_changes:
      type: integer
    visit_date:
      type: Date
    visit:
      type: character
    formoid:
      type: character
  Raw_DATAENT:
    studyid:
      type: character
    subject_nsv:
      type: character
      source_col: subjectname
    formoid:
      type: character
    min_entereddate:
      type: Date
    visit:
      type: character
  Mapped_SUBJ:
    studyid:
      type: character
    subjid:
      type: character
    subject_nsv:
      type: character
steps:
  # Merge [ subjid ] onto EDC domains.
  - output: Temp_SubjectLookup
    name: dplyr::select
    params:
      .data: Mapped_SUBJ
      subjid: subjid
      subject_nsv: subject_nsv
      studyid: studyid
  - output: Temp_DATACHG
    name: dplyr::left_join
    params:
      x: Raw_DATACHG
      "y": Temp_SubjectLookup
      by:
        - subject_nsv
        - studyid
  - output: Mapped_DATACHG
    name: dplyr::left_join
    params:
      x: Temp_DATACHG
      "y": Raw_DATAENT
      by: 
        - formoid
        - visit
        - subject_nsv
        - studyid
