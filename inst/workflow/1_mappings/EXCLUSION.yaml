meta:
  Type: Mapped
  ID: EXCLUSION
  Description: Combining IE and PD data to create QTL participant level dataset
  Priority: 2
spec:
  Mapped_IE:
    studyid:
      type: character
    subjid:
      type: character
    tiver:
      type: character
    ieorres:
      type: character
    iecat:
      type: character
    ie_violation:
      type: character
  Mapped_ENROLL:
    studyid:
      type: character
    subjectid:
      type: character
    subjid:
      type: character
    invid:
      type: character
    enrollyn:
      type: character
    country:
      type: character
    enroll_dt:
      type: Date
  Mapped_PD:
    studyid:
      type: character
    subjid:
      type: character
    companycategory:
      type: character
    deemedimportant:
      type: character
    deviationdate:
      type: Date
steps:
  - output: pivot_ie
    name: gsm.core::RunQuery
    params:
      df: Mapped_IE
      strQuery: "SELECT
        subjid,
        studyid,
        array_to_string(array_agg(iecat), ',') AS iecat_concat,
        ie_violation
      FROM df
      GROUP BY studyid, subjid, ie_violation"
  - output: add_ie
    name: dplyr::left_join
    params:
      x: Mapped_ENROLL
      'y': pivot_ie
      by:
        - subjid
        - studyid
  - output: pivot_pd
    name: gsm.core::RunQuery
    params:
      df: Mapped_PD
      strQuery: "SELECT DISTINCT
        studyid,
        subjid,
        companycategory
      FROM df
      WHERE companycategory = 'ELIGIBILITY CRITERIA'"
  - output: premapped
    name: dplyr::left_join
    params:
      x: add_ie
      'y': pivot_pd
      by:
        - subjid
        - studyid
  - output: Mapped_EXCLUSION
    name: gsm.core::RunQuery
    params:
      df: premapped
      strQuery: "SELECT *,
        CASE
          WHEN ie_violation = 'Y' AND companycategory IS NULL THEN 'EDC I/E'
          WHEN ie_violation IS NULL AND companycategory IS NOT NULL THEN 'Eligibility IPD'
          WHEN ie_violation = 'Y' AND companycategory IS NOT NULL THEN 'Ineligible, Both Criteria'
        ELSE 'Neither'
      END AS Source  FROM df WHERE enrollyn = 'Y'"
