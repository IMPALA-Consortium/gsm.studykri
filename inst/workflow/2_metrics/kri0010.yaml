meta:
  Type: Analysis
  ID: kri0010
  GroupLevel: Site
  Abbreviation: ODAT
  Metric: Delayed Data Entry Rate
  Numerator: Data Pages Entered > 10 Days
  Denominator: Total Data Pages
  Model: Bootstrap CI
  Score: Bootstrap CI
  AnalysisType: rate
  Threshold: 0.95
  AccrualThreshold: 100
  AccrualMetric: Denominator
  BootstrapReps: 1000
spec:
  Mapped_DATAENT:
    subjid:
      type: character
    data_entry_lag:
      type: integer
    min_entereddate:
      type: Date
  Mapped_SUBJ:
    subjid:
      type: character
    invid:
      type: character
    studyid:
      type: character
    firstparticipantdate:
      type: Date
    lastparticipantdate:
      type: Date
steps:
  - output: Temp_LAG
    name: RunQuery
    params:
      df: Mapped_DATAENT
      strQuery: "SELECT * FROM df WHERE data_entry_lag > 10"
  - output: Analysis_Input
    name: gsm.studykri::Input_CountSiteByMonth
    params:
      dfSubjects: Mapped_SUBJ
      dfNumerator: Temp_LAG
      dfDenominator: Mapped_DATAENT
      strStudyCol: studyid
      strGroupCol: invid
      strGroupLevel: GroupLevel
      strSubjectCol: subjid
      strNumeratorDateCol: min_entereddate
      strDenominatorDateCol: min_entereddate
      strDenominatorType: Denominator
      nMinDenominator: AccrualThreshold
  - output: Analysis_Transformed
    name: gsm.studykri::Transform_CumCount
    params:
      dfInput: Analysis_Input
      vBy: 
        - StudyID
  - output: lAnalysis
    name: list
    params:
      ID: ID
      Analysis_Input: Analysis_Input
      Analysis_Transformed: Analysis_Transformed





