meta:
  Type: Analysis
  ID: kri0001
  GroupLevel: Site
  Abbreviation: AE
  Metric: Adverse Event Rate per Visit
  Numerator: Adverse Events
  Denominator: Visits
  Model: Bootstrap CI
  Score: Bootstrap CI
  AnalysisType: rate
  Threshold: 0.95
  AccrualThreshold: 25
  AccrualMetric: Denominator
  BootstrapReps: 1000
spec:
  Mapped_AE:
    subjid:
      type: character
    aest_dt:
      type: Date
  Mapped_SUBJ:
    subjid:
      type: character
    invid:
      type: character
    studyid:
      type: character
  Mapped_Visit:
    subjid:
      type: character
    visit_dt:
      type: Date
steps:
  - output: Analysis_Input
    name: gsm.studykri::Input_CountSiteByMonth
    params:
      dfSubjects: Mapped_SUBJ
      dfNumerator: Mapped_AE
      dfDenominator: Mapped_Visit
      strStudyCol: studyid
      strGroupCol: invid
      strGroupLevel: GroupLevel
      strSubjectCol: subjid
      strNumeratorDateCol: aest_dt
      strDenominatorDateCol: visit_dt
  - output: Analysis_Transformed
    name: gsm.studykri::Transform_CumCount
    params:
      dfInput: Analysis_Input
      vBy: 
        - StudyID
      nMinDenominator: AccrualThreshold
  - output: lAnalysis
    name: list
    params:
      ID: ID
      Analysis_Input: Analysis_Input
      Analysis_Transformed: Analysis_Transformed
