meta:
  Type: Analysis
  ID: kri0007
  GroupLevel: Site
  Abbreviation: TDSC
  Metric: Treatment Discontinuation Rate
  Numerator: Subjects Discontinued - Treatment
  Denominator: Enrolled Subjects
  Model: Bootstrap CI
  Score: Bootstrap CI
  AnalysisType: rate
  Threshold: 0.95
  AccrualThreshold: 180
  AccrualMetric: Denominator
  BootstrapReps: 1000
spec:
  Mapped_SDRGCOMP:
    subjid:
      type: character
    sdrgyn:
      type: character
    phase:
      type: character
    mincreated_dts:
      type: Date
  Mapped_SUBJ:
    subjid:
      type: character
    invid:
      type: character
    studyid:
      type: character
    firstparticipantdate:
      type: Date
    lastparticipantdate:
      type: Date
steps:
  - output: Temp_DISCONTINUED
    name: RunQuery
    params:
      df: Mapped_SDRGCOMP
      strQuery: "SELECT * FROM df WHERE sdrgyn = 'N'"
  - output: Analysis_Input
    name: gsm.studykri::Input_CountSiteByMonth
    params:
      dfSubjects: Mapped_SUBJ
      dfNumerator: Temp_DISCONTINUED
      dfDenominator: Mapped_SUBJ
      strStudyCol: studyid
      strGroupCol: invid
      strGroupLevel: GroupLevel
      strSubjectCol: subjid
      strNumeratorDateCol: mincreated_dts
      strDenominatorDateCol: firstparticipantdate
      strDenominatorType: Denominator
  - output: Analysis_Transformed
    name: gsm.studykri::Transform_CumCount
    params:
      dfInput: Analysis_Input
      vBy: 
        - StudyID
      nMinDenominator: AccrualThreshold
  - output: lAnalysis
    name: list
    params:
      ID: ID
      Analysis_Input: Analysis_Input
      Analysis_Transformed: Analysis_Transformed





