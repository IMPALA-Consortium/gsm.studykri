meta:
  Type: Analysis
  ID: kri0004
  GroupLevel: Site
  Abbreviation: SAE
  Metric: Serious Adverse Event Rate per Days on Study
  Numerator: Serious Adverse Events
  Denominator: Days on Study
  Model: Bootstrap CI
  Score: Bootstrap CI
  AnalysisType: rate
  Threshold: 0.95
  AccrualThreshold: 180
  AccrualMetric: Denominator
  BootstrapReps: 1000
spec:
  Mapped_AE:
    subjid:
      type: character
    aest_dt:
      type: Date
    aeser:
      type: character
  Mapped_SUBJ:
    subjid:
      type: character
    invid:
      type: character
    studyid:
      type: character
    firstparticipantdate:
      type: Date
    lastparticipantdate:
      type: Date
steps:
  - output: Mapped_SAE
    name: gsm.core::RunQuery
    params:
      df: Mapped_AE
      strQuery: |
        SELECT *
        FROM df
        WHERE aeser = 'Y'
  - output: Analysis_Input
    name: gsm.studykri::Input_CountSiteByMonth
    params:
      dfSubjects: Mapped_SUBJ
      dfNumerator: Mapped_SAE
      dfDenominator: Mapped_SUBJ
      strStudyCol: studyid
      strGroupCol: invid
      strGroupLevel: GroupLevel
      strSubjectCol: subjid
      strNumeratorDateCol: aest_dt
      strDenominatorDateCol: firstparticipantdate
      strDenominatorEndDateCol: lastparticipantdate
      strDenominatorType: Denominator
  - output: Analysis_Transformed
    name: gsm.studykri::Transform_CumCount
    params:
      dfInput: Analysis_Input
      vBy: 
        - StudyID
      nMinDenominator: AccrualThreshold
  - output: lAnalysis
    name: list
    params:
      ID: ID
      Analysis_Input: Analysis_Input
      Analysis_Transformed: Analysis_Transformed





