meta:
  Type: Analysis
  ID: kri0006
  GroupLevel: Site
  Abbreviation: SDSC
  Metric: Study Discontinuation Rate
  Numerator: Subjects Discontinued - Study
  Denominator: Enrolled Subjects
  Model: Bootstrap CI
  Score: Bootstrap CI
  AnalysisType: rate
  Threshold: 0.95
  AccrualThreshold: 25
  AccrualMetric: Denominator
  BootstrapReps: 1000
spec:
  Mapped_STUDCOMP:
    subjid:
      type: character
    compyn:
      type: character
    mincreated_dts:
      type: Date
  Mapped_SUBJ:
    subjid:
      type: character
    invid:
      type: character
    studyid:
      type: character
    firstparticipantdate:
      type: Date
    lastparticipantdate:
      type: Date
steps:
  - output: Temp_DROPOUT
    name: RunQuery
    params:
      df: Mapped_STUDCOMP
      strQuery: "SELECT * FROM df WHERE compyn = 'N'"
  - output: Analysis_Input
    name: gsm.studykri::Input_CountSiteByMonth
    params:
      dfSubjects: Mapped_SUBJ
      dfNumerator: Temp_DROPOUT
      dfDenominator: Mapped_SUBJ
      strStudyCol: studyid
      strGroupCol: invid
      strGroupLevel: GroupLevel
      strSubjectCol: subjid
      strNumeratorDateCol: mincreated_dts
      strDenominatorDateCol: firstparticipantdate
      strDenominatorType: Denominator
      nMinDenominator: AccrualThreshold
  - output: Analysis_Transformed
    name: gsm.studykri::Transform_CumCount
    params:
      dfInput: Analysis_Input
      vBy: 
        - StudyID
  - output: lAnalysis
    name: list
    params:
      ID: ID
      Analysis_Input: Analysis_Input
      Analysis_Transformed: Analysis_Transformed





