meta:
  Type: Analysis
  ID: kri0011
  GroupLevel: Site
  Abbreviation: CDAT
  Metric: Data Change Rate
  Numerator: Data Points with 1+ Change
  Denominator: Total Data Points
  Model: Bootstrap CI
  Score: Bootstrap CI
  AnalysisType: rate
  Threshold: 0.95
  AccrualThreshold: 180
  AccrualMetric: Denominator
  BootstrapReps: 1000
spec:
  Mapped_DATACHG:
    subjid:
      type: character
    min_entereddate:
      type: Date
    n_changes:
      type: integer
  Mapped_SUBJ:
    subjid:
      type: character
    invid:
      type: character
    studyid:
      type: character
    firstparticipantdate:
      type: Date
    lastparticipantdate:
      type: Date
steps:
  - output: Temp_CHANGED
    name: RunQuery
    params:
      df: Mapped_DATACHG
      strQuery: "SELECT * FROM df WHERE n_changes > 0"
  - output: Analysis_Input
    name: gsm.studykri::Input_CountSiteByMonth
    params:
      dfSubjects: Mapped_SUBJ
      dfNumerator: Temp_CHANGED
      dfDenominator: Mapped_DATACHG
      strStudyCol: studyid
      strGroupCol: invid
      strGroupLevel: GroupLevel
      strSubjectCol: subjid
      strNumeratorDateCol: min_entereddate
      strDenominatorDateCol: min_entereddate
      strDenominatorType: Denominator
  - output: Analysis_Transformed
    name: gsm.studykri::Transform_CumCount
    params:
      dfInput: Analysis_Input
      vBy: 
        - StudyID
      nMinDenominator: AccrualThreshold
  - output: lAnalysis
    name: list
    params:
      ID: ID
      Analysis_Input: Analysis_Input
      Analysis_Transformed: Analysis_Transformed





