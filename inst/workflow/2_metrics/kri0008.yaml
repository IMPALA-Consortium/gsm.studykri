meta:
  Type: Analysis
  ID: kri0008
  GroupLevel: Site
  Abbreviation: QRY
  Metric: Query Rate
  Numerator: Queries
  Denominator: Total Data Points
  Model: Bootstrap CI
  Score: Bootstrap CI
  AnalysisType: rate
  Threshold: 0.95
  AccrualThreshold: 500
  AccrualMetric: Denominator
  BootstrapReps: 1000
spec:
  Mapped_QUERY:
    subjid:
      type: character
    querystatus:
      type: character
    created:
      type: Date
  Mapped_DATACHG:
    subjid:
      type: character
    min_entereddate:
      type: Date
  Mapped_SUBJ:
    subjid:
      type: character
    invid:
      type: character
    studyid:
      type: character
    firstparticipantdate:
      type: Date
    lastparticipantdate:
      type: Date
steps:
  - output: Temp_QUERY
    name: RunQuery
    params:
      df: Mapped_QUERY
      strQuery: "SELECT * FROM df WHERE querystatus IN ('Open','Answered','Closed')"
  - output: Analysis_Input
    name: gsm.studykri::Input_CountSiteByMonth
    params:
      dfSubjects: Mapped_SUBJ
      dfNumerator: Temp_QUERY
      dfDenominator: Mapped_DATACHG
      strStudyCol: studyid
      strGroupCol: invid
      strGroupLevel: GroupLevel
      strSubjectCol: subjid
      strNumeratorDateCol: created
      strDenominatorDateCol: min_entereddate
      strDenominatorType: Denominator
      nMinDenominator: AccrualThreshold
  - output: Analysis_Transformed
    name: gsm.studykri::Transform_CumCount
    params:
      dfInput: Analysis_Input
      vBy: 
        - StudyID
  - output: lAnalysis
    name: list
    params:
      ID: ID
      Analysis_Input: Analysis_Input
      Analysis_Transformed: Analysis_Transformed





