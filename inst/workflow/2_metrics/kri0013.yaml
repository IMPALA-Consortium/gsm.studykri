meta:
  Type: Analysis
  ID: kri0013
  GroupLevel: Site
  Abbreviation: PK
  Metric: PK Collection Compliance Rate
  Numerator: PK Samples Collected
  Denominator: PK Samples Expected
  Model: Bootstrap CI
  Score: Bootstrap CI
  AnalysisType: rate
  Threshold: 0.95
  AccrualThreshold: 180
  AccrualMetric: Denominator
  BootstrapReps: 1000
spec:
  Mapped_Visit:
    subjid:
      type: character
    # clindata is lacking the pkperf so we use peperf
    peperf:
      type: character
    visit_dt:
      type: Date
  Mapped_SUBJ:
    subjid:
      type: character
    invid:
      type: character
    studyid:
      type: character
    firstparticipantdate:
      type: Date
    lastparticipantdate:
      type: Date
steps:
  - output: PK_Collected
    name: gsm.core::RunQuery
    params:
      df: Mapped_Visit
      strQuery: "SELECT * FROM df WHERE peperf = 'Y'"
  - output: Analysis_Input
    name: gsm.studykri::Input_CountSiteByMonth
    params:
      dfSubjects: Mapped_SUBJ
      dfNumerator: PK_Collected
      dfDenominator: Mapped_Visit
      strStudyCol: studyid
      strGroupCol: invid
      strGroupLevel: GroupLevel
      strSubjectCol: subjid
      strNumeratorDateCol: visit_dt
      strDenominatorDateCol: visit_dt
      strDenominatorType: Denominator
      nMinDenominator: AccrualThreshold
  - output: Analysis_Transformed
    name: gsm.studykri::Transform_CumCount
    params:
      dfInput: Analysis_Input
      vBy: 
        - StudyID
  - output: lAnalysis
    name: list
    params:
      ID: ID
      Analysis_Input: Analysis_Input
      Analysis_Transformed: Analysis_Transformed





