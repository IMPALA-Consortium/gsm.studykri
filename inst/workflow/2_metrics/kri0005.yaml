meta:
  Type: Analysis
  ID: kri0005
  GroupLevel: Site
  Abbreviation: LB
  Metric: Grade 3+ Lab Abnormality Rate
  Numerator: Grade 3+ Abnormal Labs Samples
  Denominator: Total Lab Samples
  Model: Bootstrap CI
  Score: Bootstrap CI
  AnalysisType: rate
  Threshold: 0.95
  AccrualThreshold: 100
  AccrualMetric: Denominator
  BootstrapReps: 1000
spec:
  Mapped_SUBJ:
    subjid:
      type: character
    invid:
      type: character
  Mapped_LB:
    subjid:
      type: character
    toxgrg_nsv:
      type: character
    lb_dt:
      type: Date
steps:
  - output: Temp_ABNORMAL
    name: RunQuery
    params:
      df: Mapped_LB
      strQuery: "SELECT * FROM df WHERE toxgrg_nsv IN ('3', '4')"
  - output: Temp_LB
    name: RunQuery
    params:
      df: Mapped_LB
      strQuery: "SELECT * FROM df WHERE toxgrg_nsv IN ('0', '1', '2', '3', '4')"
  - output: Analysis_Input
    name: gsm.studykri::Input_CountSiteByMonth
    params:
      dfSubjects: Mapped_SUBJ
      dfNumerator: Temp_ABNORMAL
      dfDenominator: Temp_LB
      strStudyCol: studyid
      strGroupCol: invid
      strGroupLevel: GroupLevel
      strSubjectCol: subjid
      strNumeratorDateCol: lb_dt
      strDenominatorDateCol: lb_dt
      strDenominatorType: Denominator
      nMinDenominator: AccrualThreshold
  - output: Analysis_Transformed
    name: gsm.studykri::Transform_CumCount
    params:
      dfInput: Analysis_Input
      vBy: 
        - StudyID
  - output: lAnalysis
    name: list
    params:
      ID: ID
      Analysis_Input: Analysis_Input
      Analysis_Transformed: Analysis_Transformed





