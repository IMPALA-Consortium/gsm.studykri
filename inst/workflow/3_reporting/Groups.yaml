meta:
  Type: Reporting
  ID: Groups
  Description: Combine mapped study, site, and country data for reporting
  Priority: 1
spec:
  Mapped_STUDY:
    _all:
      required: true
  Mapped_SITE:
    _all:
      required: true
  Mapped_COUNTRY:
    _all:
      required: true
steps:
  - output: Reporting_Groups
    name: dplyr::bind_rows
    params:
      Study: Mapped_STUDY
      Site: Mapped_SITE
      Country: Mapped_COUNTRY
