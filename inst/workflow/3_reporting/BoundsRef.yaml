meta:
  Type: Reporting
  ID: BoundsRef
  Description: Calculate reference bounds for KRIs
  BootstrapReps: 1000
  Threshold: 0.95
  AccrualThreshold: 25
  Priority: 3
  bMixStudies: False
spec:
  Reporting_Join:
    _all:
      required: true
  Mapped_StudyRef:
    study:
      type: character
    studyref:
      type: character
steps:
  # Step 1: Parse reference bounds function
  - output: PredictBoundsRef_Func
    name: gsm.studykri::ParseFunction
    params:
      strFunction: gsm.studykri::Analyze_StudyKRI_PredictBoundsRef

  # Step 2: Calculate reference bounds (includes bootstrap internally)
  - output: Analysis_BoundsRef_Wide
    name: purrr::map
    params:
      .x: Reporting_Join
      .f: PredictBoundsRef_Func
      dfStudyRef: Mapped_StudyRef
      nBootstrapReps: BootstrapReps
      nConfLevel: Threshold
      bMixStudies: bMixStudies

  # Step 3: Transform reference bounds to long format
  - output: Reporting_BoundsRef
    name: gsm.studykri::Transform_Long
    params:
      lWide: Analysis_BoundsRef_Wide
